services:
  tms-postgres:
    image: postgres:17-alpine
    container_name: tms-postgres-container
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword123}
      POSTGRES_DB: ${TMS_POSTGRES_DB:-tms}
    ports:
      - "${TMS_POSTGRES_PORT:-5433}:5432"
    volumes:
      - tms-postgres_data:/var/lib/postgresql/data
      - ./postgres/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - deliveroo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${TMS_POSTGRES_DB:-tms}"]
      interval: 2s
      timeout: 5s
      retries: 5

  tms-api:
    container_name: tms-api-container
    build:
      context: ./tms-api
      dockerfile: Dockerfile
    environment:
      PORT: ${TMS_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      SERVICE_NAME: ${SERVICE_NAME:-tms-api}
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-strongpassword123}@tms-postgres:5432/${TMS_POSTGRES_DB:-tms}
    ports:
      - "${TMS_PORT:-3000}:${TMS_PORT:-3000}"
    networks:
      - deliveroo-network
    depends_on:
      tms-postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:9.4
    container_name: pgadmin-container
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-pgadmin_password}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json
    networks:
      - deliveroo-network
    depends_on:
      - tms-postgres
    restart: unless-stopped

  pact-postgres:
    image: postgres:15-alpine
    container_name: pact-postgres-container
    environment:
      POSTGRES_USER: ${PACT_POSTGRES_USER:-pact_user}
      POSTGRES_PASSWORD: ${PACT_POSTGRES_PASSWORD:-pact_password}
      POSTGRES_DB: ${PACT_POSTGRES_DB:-pact_broker}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PACT_POSTGRES_USER:-pact_user} -d ${PACT_POSTGRES_DB:-pact_broker}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pact-postgres_data:/var/lib/postgresql/data
    networks:
      - deliveroo-network
    restart: unless-stopped

  pact-broker:
    image: pactfoundation/pact-broker:latest
    container_name: pact-broker-container
    ports:
      - "9292:9292"
    depends_on:
      pact-postgres:
        condition: service_healthy
    environment:
      PACT_BROKER_DATABASE_HOST: pact-postgres
      PACT_BROKER_DATABASE_USERNAME: ${PACT_POSTGRES_USER:-pact_user}
      PACT_BROKER_DATABASE_PASSWORD: ${PACT_POSTGRES_PASSWORD:-pact_password}
      PACT_BROKER_DATABASE_NAME: ${PACT_POSTGRES_DB:-pact_broker}
      PACT_BROKER_LOG_LEVEL: INFO
    networks:
      - deliveroo-network
    restart: unless-stopped

networks:
  deliveroo-network:
    driver: bridge

volumes:
  tms-postgres_data:
  pgadmin_data:
  pact-postgres_data:
